name: Enrich Texas Broker Counties

"on":
  workflow_dispatch:
    inputs:
      max_rows:
        description: Records to process in this run
        required: true
        default: "500"
        type: string
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: texas-broker-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          rm -f input output state
          mkdir -p input output state

      - name: Move workbook into input folder
        run: |
          if [ -f brokers.xlsx ]; then
            cp brokers.xlsx input/brokers.xlsx
          fi

      - name: Resolve counties
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MAX_ROWS: ${{ inputs.max_rows || '500' }}
        run: python resolver.py --max-rows "$MAX_ROWS"

      - name: Save progress to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A state output
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update broker county enrichment progress"
            git push
          fi

      - name: Upload latest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: texas-brokers-enriched
          path: |
            output/
            state/
          if-no-files-found: warn
          retention-days: 30
