
name: Enrich Texas Broker Counties

on:
  workflow_dispatch:
    inputs:
      max_rows:
        description: "Records to process in this run"
        required: true
        default: "500"
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: texas-broker-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve counties
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python resolver.py --max-rows "${{ github.event.inputs.max_rows || '500' }}"

      - name: Save progress to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/results.csv output/brokers_enriched.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update broker county enrichment progress"
            git push
          fi

      - name: Upload latest workbook
        uses: actions/upload-artifact@v4
        with:
          name: texas-brokers-enriched
          path: |
            output/brokers_enriched.xlsx
            state/results.csv
          retention-days: 30
