name: Enrich Texas Broker Counties v2

"on":
  workflow_dispatch:
    inputs:
      max_rows:
        description: Records to process in this run
        required: true
        default: "100"
        type: string
      mode:
        description: Processing mode
        required: true
        default: new
        type: choice
        options:
          - new
          - recheck_review
          - recheck_all
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: texas-broker-enrichment-v2
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate repository
        run: |
          test -f resolver.py
          test -f config.json
          test -f input/brokers.xlsx
          mkdir -p output state

      - name: Resolve counties
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MAX_ROWS: ${{ inputs.max_rows || '100' }}
          RUN_MODE: ${{ inputs.mode || 'new' }}
        run: python resolver.py --max-rows "$MAX_ROWS" --mode "$RUN_MODE"

      - name: Save progress
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A state output
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update county enrichment progress"
            git pull --rebase
            git push
          fi

      - name: Upload latest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: texas-brokers-enriched-v2
          path: |
            output/brokers_enriched.xlsx
            state/results.csv
            state/candidates.csv
          if-no-files-found: warn
          retention-days: 30
